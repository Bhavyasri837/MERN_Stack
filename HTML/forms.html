<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
    <form>
        <label>name:</label>
        <input type="text" id="name" placeholder="john" />
        <br>
        <label>email:</label>
        <input type="email" id="email" placeholder="abc@gmail.com" />
        <br>
        <label>password:</label>
        <input type="password" id="password" placeholder="********" />
        <br>
        <label>Phone:</label>
        <input type="tel" id="phone">
        <br>
        <label>gender:</label>
        <label>Male</label>
        <input type="radio" name="gender" value="male">
        <label>Female</label>
        <input type="radio" name="gender" value="female">
        <br>
        <label>qualification:</label>
        <input class="qualification" type="checkbox" name="qualification" value="10th" required/>10th
        <input class="qualification" type="checkbox" name="qualification" value="12th" required/>12th
        <input class="qualification" type="checkbox" name="qualification" value="graduation" required/>graduation
        <input class="qualification" type="checkbox" name="qualification" value="post graduation" required>post graduation
            <br>
        <label>DOB:</label>
        <input type="date" name="dob" required/>    
        <br>
        <label>time</label>
        <input type="time" name="time" required/>

        <br>
        <label>file</label>
        <input type="file" name="file" required/>
        <br>
        <label>color</label>
        <input type="color" name="color" required/>
        <br>
        <label>range</label>
        <input type="range" name="range" required/>
        <br>
        <label>select</label>
        <select name="select" required> 
       
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <br>
        <button type="button" onclick="show()">submit</button>   
    </form>
    <div id="result"></div>
    <img id="preview" width="250" height="250" alt="Image Preview">
<script src="../JS/script.js"></script>
</body>
</html>
