<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form>
        <label>name:</label>
        <input type="text" placeholder="john" />
        <br>
        <label>email:</label>
        <input type="email" placeholder="abc@gmail.com" />
        <br>
        <label>password:</label>
        <input type="password" placeholder="********" />
        <br>
        <label>gender:</label>
        <label>female</label>   
        <input type="radio" name="gender" value="male" required/>
        <label>male</label>
        <input type="radio" name="gender" value="female" required/> 
        <br>
        <label>qualification:</label>
        <input type="checkbox" name="qualification" value="10th" required/>10th
        <input type="checkbox" name="qualification" value="12th" required/>12th
        <input type="checkbox" name="qualification" value="graduation" required/>graduation
        <input type="checkbox" name="qualification" value="post graduation" required>post graduation
            <br>
        <label>DOB:</label>
        <input type="date" name="dob" required/>    
        <br>
        <label>time</label>
        <input type="time" name="time" required/>

        <br>
        <label>file</label>
        <input type="file" name="file" required/>
        <br>
        <label>color</label>
        <input type="color" name="color" required/>
        <br>
        <label>range</label>
        <input type="range" name="range" required/>
        <br>
        <label>select</label>
        <select name="select" required> 
        <br>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <br>
        <button type="submit">submit</button>   
    </form>

</body>
</html>
